kind = "web"
previewPath = "/"
title = "Sage — AI Study Assistant"
version = "1.0.0"
id = "artifacts/sage"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18573
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/sage run dev"

[services.env]
PORT = "18573"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/sage", "run", "build"]
publicDir = "artifacts/sage/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
