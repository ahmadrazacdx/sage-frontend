openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Sage AI Study Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: chat
    description: Chat and streaming
  - name: sessions
    description: Conversation sessions
  - name: documents
    description: Document management
  - name: courses
    description: Course management
  - name: status
    description: System status
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /chat:
    post:
      operationId: submitChat
      tags: [chat]
      summary: Submit a chat message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Message submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "503":
          description: Model not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /stream/{thread_id}:
    get:
      operationId: getStream
      tags: [chat]
      summary: Stream the response via SSE
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all conversation sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"

  /sessions/{thread_id}:
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a conversation session
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /sessions/{thread_id}/messages:
    get:
      operationId: getSessionMessages
      tags: [sessions]
      summary: Get messages for a session
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /upload:
    post:
      operationId: uploadDocuments
      tags: [documents]
      summary: Upload documents
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadRequest"
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List uploaded documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /documents/{filename}:
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete an uploaded document
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /courses:
    get:
      operationId: getCourses
      tags: [courses]
      summary: Get available courses
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoursesResponse"

  /status:
    get:
      operationId: getStatus
      tags: [status]
      summary: Get system status
      responses:
        "200":
          description: System status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ChatRequest:
      type: object
      properties:
        thread_id:
          type: string
          nullable: true
        message:
          type: string
        mode:
          type: string
        course:
          type: string
      required:
        - message
        - mode
        - course

    ChatResponse:
      type: object
      properties:
        thread_id:
          type: string
        message_id:
          type: string
      required:
        - thread_id
        - message_id

    Session:
      type: object
      properties:
        thread_id:
          type: string
        title:
          type: string
        last_message_preview:
          type: string
        updated_at:
          type: string
      required:
        - thread_id
        - title
        - last_message_preview
        - updated_at

    Message:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content

    UploadRequest:
      type: object
      properties:
        files:
          type: array
          items:
            type: string
            format: binary
        course:
          type: string
      required:
        - files
        - course

    UploadResponse:
      type: object
      properties:
        status:
          type: string
        files_processed:
          type: integer
        chunks_indexed:
          type: integer
      required:
        - status
        - files_processed
        - chunks_indexed

    Document:
      type: object
      properties:
        file:
          type: string
        uploaded_at:
          type: string
        chunks:
          type: integer
      required:
        - file
        - uploaded_at
        - chunks

    CoursesResponse:
      type: object
      properties:
        courses:
          type: array
          items:
            type: string
      required:
        - courses

    SystemStatus:
      type: object
      properties:
        model_ready:
          type: boolean
        model_name:
          type: string
        llm_port:
          type: integer
        embedding_tier:
          type: string
        vectordb_collections:
          type: array
          items:
            type: string
        network_online:
          type: boolean
      required:
        - model_ready
        - model_name
        - embedding_tier
        - vectordb_collections
        - network_online

    ErrorDetail:
      type: object
      properties:
        detail:
          type: string
      required:
        - detail
